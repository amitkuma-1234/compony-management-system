<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Access — Amdox ERP Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e1a;
            --card: #111827;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --accent: #6366f1;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .header {
            margin-bottom: 24px;
        }
        .logo-box {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }
        .logo-box.google i { color: #ea4335; }
        .logo-box.microsoft i { color: #00a4ef; }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 13.5px; color: var(--text2); line-height: 1.5; }
        
        .permissions {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .permissions-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text3);
            margin-bottom: 12px;
        }
        .permission-item {
            display: flex;
            gap: 10px;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text2);
        }
        .permission-item:last-child { margin-bottom: 0; }
        .permission-item i { color: var(--accent); margin-top: 2px; }

        .user-selector {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }
        .user-selector:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
        }
        .user-info { flex: 1; }
        .user-name { font-size: 13.5px; font-weight: 600; }
        .user-email { font-size: 11.5px; color: var(--text3); }

        .btn-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-family: inherit;
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text2);
        }
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }
        .btn-allow {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        .btn-allow:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-box" id="provider-logo">
                <i class="fab fa-google"></i>
            </div>
            <h1 id="provider-title">Sign in with Google</h1>
            <p>to continue to <strong>Amdox ERP Suite</strong></p>
        </div>

        <div class="user-selector">
            <div class="avatar">AK</div>
            <div class="user-info">
                <div class="user-name">Amit Kumar</div>
                <div class="user-email">amit@amdox.com</div>
            </div>
            <i class="fas fa-chevron-down" style="font-size:12px; color:var(--text3)"></i>
        </div>

        <div class="permissions">
            <div class="permissions-title">Amdox ERP will receive:</div>
            <div class="permission-item">
                <i class="fas fa-user-check"></i>
                <span>Your profile information (Name, Avatar, Role)</span>
            </div>
            <div class="permission-item">
                <i class="fas fa-envelope"></i>
                <span>Your primary email address</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-cancel" onclick="window.close()">Cancel</button>
            <button class="btn btn-allow" id="btn-allow">Allow & Sign In</button>
        </div>
    </div>

    <script>
        // Parse provider from URL query
        const params = new URLSearchParams(window.location.search);
        const provider = params.get('provider') || 'Google';
        
        // Update UI based on provider
        const logo = document.getElementById('provider-logo');
        const title = document.getElementById('provider-title');
        
        if (provider.toLowerCase() === 'microsoft') {
            logo.className = 'logo-box microsoft';
            logo.innerHTML = '<i class="fab fa-microsoft"></i>';
            title.textContent = 'Sign in with Microsoft';
        } else {
            logo.className = 'logo-box google';
            logo.innerHTML = '<i class="fab fa-google"></i>';
            title.textContent = 'Sign in with Google';
        }

        // On Allow, simulate authentication success
        document.getElementById('btn-allow').addEventListener('click', () => {
            const user = {
                name: 'Amit Kumar',
                email: 'amit@amdox.com',
                role: 'Super Admin',
                status: 'Active'
            };
            const token = btoa(JSON.stringify({ email: user.email, exp: Date.now() + 24*60*60*1000 }));
            
            // Set localStorage in parent window context
            if (window.opener) {
                try {
                    window.opener.localStorage.setItem('amdox_auth_token', token);
                    window.opener.localStorage.setItem('amdox_auth_user', JSON.stringify(user));
                    window.opener.handleSSOSuccess();
                } catch (e) {
                    console.error('SSO cross-origin communication failed:', e);
                }
            }
            window.close();
        });
    </script>
</body>
</html>
